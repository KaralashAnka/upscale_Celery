services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  flask_app:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "5000:5000"
    depends_on:
      - redis
    command: python app.py

  celery_worker:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: celery -A tasks.celery_app worker --loglevel=info
